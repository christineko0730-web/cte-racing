        transform: translateY(8px) scale(0.99);
      }
      to {

        transform: translateY(0) scale(1);

    // ==========================================
    // AUDIO ENGINE & HELPERS
    // ==========================================
    function playSfx(type) {
      try {
        if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        if (audioCtx.state === 'suspended') { audioCtx.resume(); }
        const now = audioCtx.currentTime;
        if (type === 'click') {
          const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
          osc.connect(gain); gain.connect(audioCtx.destination);
          osc.type = 'triangle'; osc.frequency.setValueAtTime(420, now); osc.frequency.exponentialRampToValueAtTime(100, now + 0.08);
          gain.gain.setValueAtTime(0.12, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
          osc.start(); osc.stop(now + 0.08);
        } else if (type === 'mechanical') {
          const osc1 = audioCtx.createOscillator(); const osc2 = audioCtx.createOscillator(); const gain = audioCtx.createGain();
          osc1.connect(gain); osc2.connect(gain); gain.connect(audioCtx.destination);
          osc1.type = 'sawtooth'; osc2.type = 'sine'; osc1.frequency.setValueAtTime(190, now); osc2.frequency.setValueAtTime(1100, now);

        } else if (type === 'success') {
          const osc1 = audioCtx.createOscillator(); const osc2 = audioCtx.createOscillator(); const gain = audioCtx.createGain();

          osc1.start(); osc2.start(); osc1.stop(now + 0.4); osc2.stop(now + 0.4);
        }
      } catch (e) { /* Safe fallback */ }
    }

      toast.classList.remove('hidden');
      setTimeout(() => { toast.classList.remove('opacity-0', '-translate-y-4'); toast.classList.add('opacity-100', 'translate-y-0'); }, 50);

        toast.classList.remove('opacity-100', 'translate-y-0'); toast.classList.add('opacity-0', '-translate-y-4');
        setTimeout(() => { toast.classList.add('hidden'); }, 300);

    }

    // ==========================================
    // DATA FILTERING ENGINE (BUSINESS RULES)
    // ==========================================
    function getMaxDiscSize(rim, isFront) {
      if (!rim) return "";
      if (isFront) {
        if (rim <= 16) return "290mm";
        if (rim === 17) return "360mm";
        if (rim === 18) return "380mm";
        if (rim === 19) return "400mm";
        if (rim === 20) return "410mm";
        if (rim >= 21) return "440mm";
      } else {
        if (rim === 18) return "380mm";
        if (rim === 19) return "390mm";
        if (rim >= 20) return "400mm";
      }
    }

    function processCaliperLogic() {
      // Automatic Disc Assignment based on Rim
      if(config.frontRim) config.frontDisc = getMaxDiscSize(config.frontRim, true);
      if(config.rearRim) config.rearDisc = getMaxDiscSize(config.rearRim, false);

      // Front Engine
      if (config.position === 'front' || config.position === 'both') {
        let r = config.frontRim;
        let g = config.grade || 'SPORT'; 
        let model = 'CF4421'; 
        
        if (r === 15 || r === 16) model = 'CF4421';
        else if (r === 17) model = 'CM5411';
        else if (r === 18) {
          model = (g === 'STREET' || g === 'SPORT') ? 'CF5421' : 'CM5411';
        }
        else if (r === 19) {
          model = (g === 'STREET' || g === 'SPORT') ? 'CF8621 / CF8622' : 'CM8611';
        }
        else if (r === 20 || r === 21) {
          if (g === 'STREET' || g === 'SPORT') model = 'CF8621 / CF8622';
          else if (g === 'RACING') model = 'CM8611';
          else model = 'CM9611 / CM9612'; 
        }
        else if (r === 22) {
          if (g === 'STREET' || g === 'SPORT') model = 'CF8621 / CF8622'; 
          else if (g === 'RACING') model = 'CM8611';
          else model = 'CM9611 / CM9612'; 
        }
        else if (r === 23) {
          model = 'CM9611 / CM9612'; 
        }
        config.selectedFrontCaliper = FRONT_CALIPERS_DB.find(c => c.model === model) || FRONT_CALIPERS_DB[0];
      }

      // Rear Engine
      if (config.position === 'rear' || config.position === 'both') {
        let g = config.grade || 'SPORT';
        let model = 'CF2421';
        if (config.hasEPB) {
          model = 'EB2221';
        } else {
          model = (g === 'STREET' || g === 'SPORT') ? 'CF2421' : 'CM2411';
        }
        config.selectedRearCaliper = REAR_CALIPERS_DB.find(c => c.model === model) || REAR_CALIPERS_DB[0];
      }
    }

      document.getElementById('ribbon-front-rim').innerText = config.frontRim ? config.frontRim + '"' : '-';
      document.getElementById('ribbon-rear-rim').innerText = config.rearRim ? config.rearRim + '"' : '-';

    window.navigateStep = function(offset) {
      let next = currentStep + offset;
      
      // Validation Check
      if (offset > 0) {
        if (currentStep === 1 && !config.position) { showToast(getT('alertPosition')); return; }
        if (currentStep === 2) {
          if ((config.position === 'front' || config.position === 'both') && !config.frontRim) { showToast(getT('alertFrontRim')); return; }
          if ((config.position === 'rear' || config.position === 'both') && !config.rearRim) { showToast(getT('alertRearRim')); return; }
        }
        if (currentStep === 3 && !config.grade) { showToast(getT('alertGrade')); return; }
      }

      // Logic Jump: Do we need Step 3 (Grade/Scenario)?
      let needsGrade = false;
      if (config.position === 'front' || config.position === 'both') {
        if ([18, 19, 20, 21, 22].includes(config.frontRim)) needsGrade = true;
      }
      if (config.position === 'rear' || config.position === 'both') {
        if (!config.hasEPB) needsGrade = true; 
      }

      // Handle Automatic Skips
      if (offset > 0 && currentStep === 2 && !needsGrade) {
        next = 4; // Skip to result
      } else if (offset < 0 && currentStep === 4 && !needsGrade) {
        next = 2; // Return to Rim
      }

      if (next < 0 || next > TOTAL_STEPS) return;
      currentStep = next;

      if (currentStep === 4) {
        processCaliperLogic();
      }

      playSfx('mechanical');
      renderStepContent();
    };

    function startCarousel() {
      if (carouselTimer) clearInterval(carouselTimer);
      let idx = 0;
      let currentBg = 1;
      const phrases = [getT('c1'), getT('c2'), getT('c3')];
      
      const textEl = document.getElementById('welcome-carousel-text');
      const bgImg1 = document.getElementById('bg-carousel-img1');
      const bgImg2 = document.getElementById('bg-carousel-img2');
      
      if (!textEl || !bgImg1 || !bgImg2) return;
      
      textEl.innerText = phrases[idx];
      bgImg1.src = WELCOME_IMAGES[idx];
      bgImg1.style.opacity = 1;
      bgImg2.style.opacity = 0;

      carouselTimer = setInterval(() => {
        idx++;
        if (document.getElementById('welcome-carousel-text')) {
          const el = document.getElementById('welcome-carousel-text');
          el.style.opacity = 0;
          
          const nextImgSrc = WELCOME_IMAGES[idx % WELCOME_IMAGES.length];
          const nextPhrase = phrases[idx % phrases.length];

          if (currentBg === 1) {
            bgImg2.src = nextImgSrc;
            bgImg2.style.opacity = 1;
            bgImg1.style.opacity = 0;
            currentBg = 2;
          } else {
            bgImg1.src = nextImgSrc;
            bgImg1.style.opacity = 1;
            bgImg2.style.opacity = 0;
            currentBg = 1;
          }

          setTimeout(() => {
            const updatedEl = document.getElementById('welcome-carousel-text');
            if (updatedEl) {
              updatedEl.innerText = nextPhrase;
              updatedEl.style.opacity = 1;
            }
          }, 500);
        }
      }, 3000);
    }

          </div>

            </p>

            <div class="grid grid-cols-1 md:grid-cols-12 gap-8 pt-4">
              
              <!-- Left: Form & Docs -->

                  <div class="border-b border-dashed border-neutral-800 pb-4 mb-2 flex justify-between items-center">

                      <span class="text-apexOrange font-black text-sm md:text-base tracking-widest uppercase">${getT('buildSlip')}</span>

                    </div>

                        <span class="text-neutral-500">${getT('padPart')}</span>
                        <span class="text-neutral-100 tracking-wide">${config.selectedFrontCaliper?.padModel}</span>
                      </div>
                    </div>
                  ` : ''}

                  ${(config.position === 'rear' || config.position === 'both') ? `
                    <div class="space-y-2 pt-2">
                      <div class="font-black text-racingRed text-[11px] uppercase border-b border-neutral-950 pb-1">${getT('rearChassis')}</div>

                        <span class="text-neutral-500">${getT('calModel')}</span>
                        <span class="text-neutral-100 font-bold tracking-wide">${config.selectedRearCaliper?.model}</span>

                      <div class="flex justify-between text-xs">
                        <span class="text-neutral-500">${getT('rotorProfile')}</span>
                        <span class="text-neutral-100 font-bold tracking-wide">CCM ${config.rearDisc}</span>

                        <span class="text-neutral-100 tracking-wide">${config.selectedRearCaliper?.padModel}</span>

                      placeholder="${getT('carPlaceholder')}"

                    />

                  >
                    ${getT('activateSoul')}
                  </button>
                </div>

              </div>

              <!-- Right: Visualizer -->
              <div class="md:col-span-5 flex flex-col relative h-full z-10">
               <div class="bg-gradient-to-br from-neutral-900 to-black border border-neutral-850 rounded-xl p-6 font-mono text-xs text-neutral-300 shadow-2xl h-full flex flex-col">              
                <div class="mb-6">
                 <div class="text-white font-black text-sm md:text-base tracking-widest uppercase">
                  ${getT('dwgTitle')}
                </div>

  ${(config.position === 'front' || config.position === 'both') ? `
    <div class="text-[10px] font-mono text-neutral-500 uppercase mt-2">
      FRONT: <span class="text-white font-bold">${config.selectedFrontCaliper?.model}</span>
    </div>
  ` : ''}

  ${(config.position === 'rear' || config.position === 'both') ? `
    <div class="text-[10px] font-mono text-neutral-500 uppercase mt-1">
      REAR: <span class="text-white font-bold">${config.selectedRearCaliper?.model}</span>
    </div>
  ` : ''}
</div>

                        <img

                          class="object-contain w-full max-h-[240px] md:max-h-[300px] drop-shadow-[0_10px_20px_rgba(0,0,0,0.8)] transition-transform duration-500 group-hover:scale-110 relative z-10"

                            <text x="27" y="24" fill="#ffffff" font-size="3" font-family="monospace" font-weight="bold">FRONT CTE</text>
                          </svg>
                        </div>
                      </div>
                    </div>
                  ` : ''}

                  ${(config.position === 'rear' || config.position === 'both') ? `

                        <div class="absolute inset-0 bg-racingRed/5 opacity-0 group-hover:opacity-100 transition-opacity duration-500 pointer-events-none"></div>
                        
                        <img 
                          src="${config.selectedRearCaliper?.image}" 
                          alt="${config.selectedRearCaliper?.model}" 
                          class="object-contain w-full max-h-[240px] md:max-h-[300px] drop-shadow-[0_10px_20px_rgba(0,0,0,0.8)] transition-transform duration-500 group-hover:scale-110 relative z-10"
                          id="img-rear-final"
                          onerror="this.style.display='none'; document.getElementById('svg-fallback-rear').classList.remove('hidden');"
                        />

                        <div id="svg-fallback-rear" class="hidden absolute inset-0 flex items-center justify-center p-4">
                          <svg class="w-2/3 h-2/3 text-neutral-800 animate-pulse" viewBox="0 0 100 60" fill="none" stroke="currentColor">
                            <circle cx="50" cy="30" r="20" stroke="#1f1f1f" stroke-width="1.5" stroke-dasharray="2,2" />
                            <path d="M25 15 C25 25, 30 35, 48 40 L45 10 Z" fill="#FF1E27" stroke="#ffffff" stroke-width="0.5" opacity="0.8" />
                            <text x="27" y="24" fill="#ffffff" font-size="3" font-family="monospace" font-weight="bold">REAR CTE</text>
                          </svg>
                        </div>
                      </div>
                    </div>
                  ` : ''}

                </div>
              </div>

            </div>
          </div>
