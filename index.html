        linear-gradient(-45deg, #050506 25%, transparent 25%), 
        linear-gradient(45deg, transparent 75%, #050506 75%), 
        linear-gradient(-45deg, transparent 75%, #050506 75%);

      position: relative;
    }

    .step-fade-in {
      animation: stepFadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    
    @keyframes stepFadeIn {
      from {
        opacity: 0;
        transform: translateY(8px) scale(0.99);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    function playSfx(type) {
      try {
        if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        if (audioCtx.state === 'suspended') { audioCtx.resume(); }
        const now = audioCtx.currentTime;
        if (type === 'click') {
          const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
          osc.connect(gain); gain.connect(audioCtx.destination);
          osc.type = 'triangle'; osc.frequency.setValueAtTime(420, now); osc.frequency.exponentialRampToValueAtTime(100, now + 0.08);
          gain.gain.setValueAtTime(0.12, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
          osc.start(); osc.stop(now + 0.08);
        } else if (type === 'mechanical') {
          const osc1 = audioCtx.createOscillator(); const osc2 = audioCtx.createOscillator(); const gain = audioCtx.createGain();
          osc1.connect(gain); osc2.connect(gain); gain.connect(audioCtx.destination);
          osc1.type = 'sawtooth'; osc2.type = 'sine'; osc1.frequency.setValueAtTime(190, now); osc2.frequency.setValueAtTime(1100, now);

        }
      } catch (e) { /* Safe fallback */ }

        toast.classList.remove('opacity-100', 'translate-y-0'); toast.classList.add('opacity-0', '-translate-y-4');
        setTimeout(() => { toast.classList.add('hidden'); }, 300);
      }, 3500);
    }

    // ==========================================
    // DATA FILTERING ENGINE (BUSINESS RULES)
    // ==========================================
    function processFrontCaliper() {
      let r = config.frontRim;
      let g = config.grade || 'SPORT'; 
      let model = 'CF4421'; // Safest Fallback
      
      if (r === 15 || r === 16) model = 'CF4421';
      else if (r === 17) model = 'CM5411';
      else if (r === 18) {
        if (g === 'STREET' || g === 'SPORT') model = 'CF5421';
        else model = 'CM5411';
      }
      else if (r === 19) {
        if (g === 'STREET' || g === 'SPORT') model = 'CF8621 / CF8622';
        else model = 'CM8611';
      }
      else if (r === 20 || r === 21) {
        if (g === 'STREET' || g === 'SPORT') model = 'CF8621 / CF8622';
        else if (g === 'RACING') model = 'CM8611';
        else model = 'CM9611'; // ULTRA default
      }
      else if (r === 22) {
        if (g === 'STREET' || g === 'SPORT') model = 'CF8621 / CF8622'; 
        else if (g === 'RACING') model = 'CM8611';
        else model = 'CM9612'; // ULTRA 22
      }
      else if (r === 23) {
        model = 'CM9612'; // Fixed big caliper
      }
      return FRONT_CALIPERS_DB.find(c => c.model === model) || FRONT_CALIPERS_DB[0];
    }

    function processRearCaliper() {
      if (config.hasEPB) return REAR_CALIPERS_DB.find(c => c.model === 'EB2221');
      
      let g = config.grade || 'SPORT';
      let model = (g === 'STREET' || g === 'SPORT') ? 'CF2421' : 'CM2411';
      return REAR_CALIPERS_DB.find(c => c.model === model) || REAR_CALIPERS_DB[0];
    }

      document.getElementById('ribbon-rear-rim').innerText = config.rearRim ? config.rearRim + '"' : '-';
    }

    window.navigateStep = function(offset) {
      let next = currentStep + offset;
      
      // Validation Check
      if (offset > 0) {
        if (currentStep === 1 && !config.position) { showToast(getT('alertPosition')); return; }
        if (currentStep === 2) {
          if ((config.position === 'front' || config.position === 'both') && !config.frontRim) { showToast(getT('alertFrontRim')); return; }
          if ((config.position === 'rear' || config.position === 'both') && !config.rearRim) { showToast(getT('alertRearRim')); return; }
        }
        if (currentStep === 3 && !config.grade) { showToast(getT('alertGrade')); return; }
      }

      // Logic Jump: Do we need Step 3 (Grade/Scenario)?
      let needsGrade = false;
      if (config.position === 'front' || config.position === 'both') {
        // Only require scenario if wheel is 18-22
        if ([18, 19, 20, 21, 22].includes(config.frontRim)) needsGrade = true;
      }
      if (config.position === 'rear' || config.position === 'both') {
        // If it has EPB, it goes to EB2221. Doesn't need grade.
        if (!config.hasEPB) needsGrade = true; 
      }

      // Handle Automatic Skips
      if (offset > 0 && currentStep === 2 && !needsGrade) {
        next = 4; // Skip to result
      } else if (offset < 0 && currentStep === 4 && !needsGrade) {
        next = 2; // Return to Rim
      }

      if (next < 1 || next > TOTAL_STEPS) return;
      currentStep = next;

      // Upon entering Step 4, definitively configure final setup via Logic Engine
      if (currentStep === 4) {
        if (config.position === 'front' || config.position === 'both') config.selectedFrontCaliper = processFrontCaliper();
        if (config.position === 'rear' || config.position === 'both') config.selectedRearCaliper = processRearCaliper();
      }

      playSfx('mechanical');
      renderStepContent();
    };

                    class="w-full bg-gradient-to-r from-apexOrange via-racingRed to-apexOrange hover:brightness-110 active:scale-95 transition-all text-black font-mono font-black tracking-widest py-3.5 px-6 rounded-lg text-xs md:text-sm text-center uppercase shadow-[0_0_15px_rgba(255,106,0,0.2)] hover:shadow-[0_0_25px_rgba(255,106,0,0.4)]"
                  >
                    ${getT('activateSoul')}
                  </button>
                </div>

              </div>

              <!-- Right: Visualizer -->
              <div class="md:col-span-5 flex flex-col gap-5 relative h-full">
                <div class="text-[10px] md:text-xs font-mono text-neutral-500 uppercase tracking-widest border-b border-neutral-850 pb-2">
                  ${getT('dwgTitle')}
                </div>

                <div class="flex flex-col gap-6 h-full justify-center">
                  
                  ${(config.position === 'front' || config.position === 'both') ? `
                    <div class="relative w-full flex flex-col group">
                      <div class="absolute top-2 left-3 text-[10px] font-mono text-apexOrange uppercase font-bold z-20 bg-black/90 px-2 py-0.5 rounded border border-neutral-800">
                        FRONT: ${config.selectedFrontCaliper?.model}
                      </div>
                      <div class="w-full bg-gradient-to-br from-neutral-900 to-black rounded-xl border border-neutral-800 flex items-center justify-center p-6 overflow-hidden relative min-h-[160px] md:min-h-[200px] shadow-inner">
                        <div class="absolute inset-0 bg-apexOrange/5 opacity-0 group-hover:opacity-100 transition-opacity duration-500 pointer-events-none"></div>
                        
                        <img 
                          src="${config.selectedFrontCaliper?.image}" 
                          alt="${config.selectedFrontCaliper?.model}" 
                          class="object-contain w-full max-h-[140px] md:max-h-[180px] drop-shadow-[0_10px_20px_rgba(0,0,0,0.8)] transition-transform duration-500 group-hover:scale-110 relative z-10"
                          id="img-front-final"
                          onerror="this.style.display='none'; document.getElementById('svg-fallback-front').classList.remove('hidden');"
                        />

                        <div id="svg-fallback-front" class="hidden absolute inset-0 flex items-center justify-center p-4">
                          <svg class="w-2/3 h-2/3 text-neutral-800 animate-pulse" viewBox="0 0 100 60" fill="none" stroke="currentColor">
                            <circle cx="50" cy="30" r="22" stroke="#1f1f1f" stroke-width="1.5" stroke-dasharray="2,2" />
                            <path d="M25 15 C25 25, 30 35, 48 40 L45 10 Z" fill="${config.selectedFrontCaliper?.color || '#FF6A00'}" stroke="#ffffff" stroke-width="0.5" opacity="0.8" />
                            <text x="27" y="24" fill="#ffffff" font-size="3" font-family="monospace" font-weight="bold">FRONT CTE</text>
                          </svg>
                        </div>
                      </div>
                    </div>
                  ` : ''}

                  ${(config.position === 'rear' || config.position === 'both') ? `
                    <div class="relative w-full flex flex-col group ${config.position === 'both' ? 'mt-2' : ''}">
                      <div class="absolute top-2 left-3 text-[10px] font-mono text-racingRed uppercase font-bold z-20 bg-black/90 px-2 py-0.5 rounded border border-neutral-800">
                        REAR: ${config.selectedRearCaliper?.model}
                      </div>
                      <div class="w-full bg-gradient-to-br from-neutral-900 to-black rounded-xl border border-neutral-800 flex items-center justify-center p-6 overflow-hidden relative min-h-[160px] md:min-h-[200px] shadow-inner">
                        <div class="absolute inset-0 bg-racingRed/5 opacity-0 group-hover:opacity-100 transition-opacity duration-500 pointer-events-none"></div>
                        
                        <img 
                          src="${config.selectedRearCaliper?.image}" 
                          alt="${config.selectedRearCaliper?.model}" 
                          class="object-contain w-full max-h-[140px] md:max-h-[180px] drop-shadow-[0_10px_20px_rgba(0,0,0,0.8)] transition-transform duration-500 group-hover:scale-110 relative z-10"
                          id="img-rear-final"
                          onerror="this.style.display='none'; document.getElementById('svg-fallback-rear').classList.remove('hidden');"
                        />

                        <div id="svg-fallback-rear" class="hidden absolute inset-0 flex items-center justify-center p-4">
                          <svg class="w-2/3 h-2/3 text-neutral-800 animate-pulse" viewBox="0 0 100 60" fill="none" stroke="currentColor">
                            <circle cx="50" cy="30" r="20" stroke="#1f1f1f" stroke-width="1.5" stroke-dasharray="2,2" />
                            <path d="M25 15 C25 25, 30 35, 48 40 L45 10 Z" fill="#FF1E27" stroke="#ffffff" stroke-width="0.5" opacity="0.8" />
                            <text x="27" y="24" fill="#ffffff" font-size="3" font-family="monospace" font-weight="bold">REAR CTE</text>
                          </svg>
                        </div>
                      </div>
                    </div>
                  ` : ''}

                </div>
              </div>

            </div>
          </div>
        `;
      }

      contentBox.innerHTML = html;
    }

    window.onload = function() {
      syncStateRibbons();
      renderStepContent();
    }
  </script>
</body>
</html>
