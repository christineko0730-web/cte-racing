        extend: {
          colors: {

    /* High-fidelity Carbon Fiber CSS Background Grid */
    .carbon-bg {
      background-color: #0b0c0e;
      background-image: 
        linear-gradient(45deg, #050506 25%, transparent 25%), 
        linear-gradient(-45deg, #050506 25%, transparent 25%), 
        linear-gradient(45deg, transparent 75%, #050506 75%), 
        linear-gradient(-45deg, transparent 75%, #050506 75%);
      background-size: 14px 16px;
      position: relative;
    }

    /* Slick custom slide transition animations */
    .step-fade-in {
      animation: stepFadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    
    @keyframes stepFadeIn {
      from {
        opacity: 0;
        transform: translateY(8px) scale(0.99);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
  </style>
</head>

    <!-- Outer Interactive Card -->
    <div class="w-full bg-[#111316]/95 border border-neutral-800/80 rounded-2xl p-6 md:p-10 shadow-2xl backdrop-blur-md relative overflow-hidden">
      
      <!-- Slanted gradient line accent -->
      <div class="absolute top-0 right-0 w-44 h-[3px] bg-gradient-to-r from-racingRed to-apexOrange"></div>

      <!-- Progress Tracking Bar -->
      <div class="flex items-center justify-between mb-8 pb-4 border-b border-neutral-900">
        <span class="text-xs font-mono text-apexOrange tracking-widest font-black flex items-center gap-2">

          <span id="lbl-step-num">STEP</span> <span id="current-step-num">1</span> <span id="lbl-step-of">OF</span> 6
        </span>
        <div class="flex gap-1.5">

          CTE RACING HIGH PERFORMANCE SYSTEMS

          NEXT STEP / 下一步 ▶
        </button>
      </div>

    </div>

  </main>

    let audioCtx = null;
    function playSfx(type) {
      try {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
          audioCtx.resume();
        }
        
        const now = audioCtx.currentTime;
        if (type === 'click') {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(420, now);
          osc.frequency.exponentialRampToValueAtTime(100, now + 0.08);
          gain.gain.setValueAtTime(0.12, now);
          gain.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
          osc.start();
          osc.stop(now + 0.08);
        } else if (type === 'mechanical') {
          const osc1 = audioCtx.createOscillator();
          const osc2 = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc1.connect(gain);
          osc2.connect(gain);
          gain.connect(audioCtx.destination);
          
          osc1.type = 'sawtooth';
          osc2.type = 'sine';
          osc1.frequency.setValueAtTime(190, now);
          osc2.frequency.setValueAtTime(1100, now);
          osc1.frequency.exponentialRampToValueAtTime(80, now + 0.15);
          osc2.frequency.exponentialRampToValueAtTime(1900, now + 0.12);
          
          gain.gain.setValueAtTime(0.08, now);
          gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
          osc1.start();
          osc2.start();
          osc1.stop(now + 0.15);
          osc2.stop(now + 0.15);
        } else if (type === 'success') {
          const osc1 = audioCtx.createOscillator();
          const osc2 = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc1.connect(gain);
          osc2.connect(gain);
          gain.connect(audioCtx.destination);
          
          osc1.type = 'sine';
          osc1.frequency.setValueAtTime(523.25, now); 
          osc1.frequency.setValueAtTime(880, now + 0.12); 
          osc2.type = 'sine';
          osc2.frequency.setValueAtTime(1046.50, now); 
          osc2.frequency.setValueAtTime(1760, now + 0.12); 
          
          gain.gain.setValueAtTime(0.15, now);
          gain.gain.exponentialRampToValueAtTime(0.15, now + 0.12);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
          
          osc1.start();
          osc2.start();
          osc1.stop(now + 0.4);
          osc2.stop(now + 0.4);
        }
      } catch (e) {
        // Safe fallback
      }
    }

      setTimeout(() => {

        toast.classList.add('opacity-100', 'translate-y-0');
      }, 50);

      setTimeout(() => {

        toast.classList.add('opacity-0', '-translate-y-4');
        setTimeout(() => {
          toast.classList.add('hidden');

    function getFrontDiscChoices() {
      if (!config.frontRim) return { standard: '350mm', extreme: '380mm' };
      if (config.frontRim <= 16) {
        return { standard: '280mm', extreme: '290mm' };
      } else if (config.frontRim === 17) {
        return { standard: '330mm', extreme: '350mm' };
      } else if (config.frontRim === 18) {
        return { standard: '350mm', extreme: '380mm' };
      } else if (config.frontRim === 19) {
        return { standard: '380mm', extreme: '410mm' };
      } else if (config.frontRim >= 20 && config.frontRim <= 21) {
        return { standard: '400mm', extreme: '410mm' };
      } else {
        return { standard: '420mm', extreme: '440mm' };
      }
    }

    function getRearDiscChoices() {
      if (!config.rearRim) return { standard: '350mm', extreme: '380mm' };
      if (config.rearRim === 18) {
        return { standard: '350mm', extreme: '380mm' };
      } else if (config.rearRim === 19) {
        return { standard: '380mm', extreme: '390mm' };
      } else {
        return { standard: '390mm', extreme: '400mm' };
      }
    }

    function getFrontCaliperOptions() {
      if (!config.frontRim) return [];
      let valid = FRONT_CALIPERS_DB.filter(c => c.rimsSupported.includes(config.frontRim));
      if (valid.length === 0) valid = [FRONT_CALIPERS_DB[0]]; // 終極防錯機制
      if (config.frontPistons) {
        let pistonMatch = valid.filter(c => c.pistons.includes(config.frontPistons));
        if (pistonMatch.length > 0) return pistonMatch;
      }
      return valid;
    }

    function getRearCaliperOptions() {
      if (!config.rearRim) return [];
      let valid = REAR_CALIPERS_DB.filter(c => c.rimsSupported.includes(config.rearRim));
      if (valid.length === 0) valid = [REAR_CALIPERS_DB[0]]; // 終極防錯機制
      return valid;

    window.navigateStep = function(offset) {
      const next = currentStep + offset;
      
      if (offset > 0) {
        if (currentStep === 1 && !config.position) {
          showToast(getT('alertPosition'));
          return;
        }
        if (currentStep === 2) {
          if ((config.position === 'front' || config.position === 'both') && !config.frontRim) {
            showToast(getT('alertFrontRim'));
            return;
          }
          if ((config.position === 'rear' || config.position === 'both') && !config.rearRim) {
            showToast(getT('alertRearRim'));
            return;
          }
        }
        if (currentStep === 3 && (config.position === 'front' || config.position === 'both') && !config.frontPistons) {
          showToast(getT('alertPistons'));
          return;
        }
        if (currentStep === 4) {
          if ((config.position === 'front' || config.position === 'both') && !config.frontDisc) {
            showToast(getT('alertFrontDisc'));
            return;
          }
          if ((config.position === 'rear' || config.position === 'both') && !config.rearDisc) {
            showToast(getT('alertRearDisc'));
            return;
          }
        }
        if (currentStep === 5) {
          if ((config.position === 'front' || config.position === 'both') && !config.selectedFrontCaliper) {
            showToast(getT('alertFrontCaliper'));
            return;
          }
          if ((config.position === 'rear' || config.position === 'both') && !config.selectedRearCaliper) {
            showToast(getT('alertRearCaliper'));
            return;
          }
        }
      }

      if (next < 1 || next > 6) return;

      if (next === 3 && config.position === 'rear') {
        currentStep = (offset > 0) ? 4 : 2;
      } else if (next === 3 && config.frontRim && config.frontRim < 17) {
        config.frontPistons = '4 POT';
        currentStep = (offset > 0) ? 4 : 2;
      } else {
        currentStep = next;
      }

      if (currentStep === 5) {
        const fOpts = getFrontCaliperOptions();
        if (fOpts.length === 1) config.selectedFrontCaliper = fOpts[0];
        const rOpts = getRearCaliperOptions();
        if (rOpts.length === 1) config.selectedRearCaliper = rOpts[0];
      }

      playSfx('mechanical');
      renderStepContent();
    };
